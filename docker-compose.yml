version: '3.8'

services:
  posman:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: posman
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    ports:
      - "5000:5000"
    volumes:
      - ./config:/config
      - ./data:/data
      - ./backups:/backups
      - ./app:/app:ro  # Read-only mount for development
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
      - CONFIG_PATH=/config
    networks:
      - posman-network

networks:
  posman-network:
    driver: bridge