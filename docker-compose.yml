version: '3.8'

services:
  posman:
    build: .
    container_name: posman
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./config:/config
      - ./data:/data
      - ./backups:/backups
      - ./app:/app:ro  # Read-only mount for development
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app
      - FLASK_DEBUG=1
      - PYTHONUNBUFFERED=1
    networks:
      - posman-network

networks:
  posman-network:
    driver: bridge